name: dbt_affiliate_api
version: 1.0.0
config-version: 2

profile: dbt_affiliate_api

model-paths: ["models"]
macro-paths: ["macros"]
test-paths: ["dbt_tests"]
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  aws_s3_bucket: "s3://datawarehouse-unidays-datainsights/affiliate_networks_v2"
  affiliate_child_json_items_map:
    awin_transactions:
      transaction_parts: "$.transactionParts"
      basket_products: "$.basketProducts"
    awin_validations:
      transaction_parts: "$.transactionParts"
      basket_products: "$.basketProducts"
    commission_factory:
      items: "$.Items"
    commission_junction:
      items: "$.items"
    hasoffers: {}
    impact_radius: {}
    partnerize:
      conversion_items: "$.conversion_data.conversion_items"
    pepperjam: {}
    rakuten: {}
    tradedoubler:
      product_info: "$.productInfo"
    webgains:
      items: "$.items"

models:
  dbt_affiliate_api:
    +materialized: table
    +meta:
      lookback_days: "{{ var('lookback_days', 7) }}"
      end_date: "{{ var('end_date', run_started_at.strftime('%Y-%m-%d')) }}"
      affiliate_network_name: "{{ var('affiliate_network_name', '') }}"
