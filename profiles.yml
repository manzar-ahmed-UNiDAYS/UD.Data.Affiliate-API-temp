dbt_affiliate_api:
  target: "{{ env_var('AFFILIATE_DBT_TARGET', 'awin_transactions') }}"
# DuckDB connections for staging raw data, used in step1_extract_from_api.sql and step2_transactions.sql  
  outputs:

    awin_transactions:
      type: duckdb
      path: >-
        {{ env_var('AFFILIATE_DUCKDB_PATH', env_var('HOME')) ~ '/affiliate_awin_transactions.duckdb' }}
      schema: staging
      threads: 1
      module_paths: ["{{ env_var('DBT_AFFILIATE_PROJECT_DIR') }}"]

    awin_validations:
      type: duckdb
      path: >-
        {{ env_var('AFFILIATE_DUCKDB_PATH', env_var('HOME')) ~ '/affiliate_awin_validations.duckdb' }}
      schema: staging
      threads: 1
      module_paths: ["{{ env_var('DBT_AFFILIATE_PROJECT_DIR') }}"]

    commission_factory:
      type: duckdb
      path: >-
        {{ env_var('AFFILIATE_DUCKDB_PATH', env_var('HOME')) ~ '/affiliate_commission_factory.duckdb' }}
      schema: staging
      threads: 1
      module_paths: ["{{ env_var('DBT_AFFILIATE_PROJECT_DIR') }}"]

    commission_junction:
      type: duckdb
      path: >-
        {{ env_var('AFFILIATE_DUCKDB_PATH', env_var('HOME')) ~ '/affiliate_commission_junction.duckdb' }}
      schema: staging
      threads: 1
      module_paths: ["{{ env_var('DBT_AFFILIATE_PROJECT_DIR') }}"]

    hasoffers:
      type: duckdb
      path: >-
        {{ env_var('AFFILIATE_DUCKDB_PATH', env_var('HOME')) ~ '/affiliate_hasoffers.duckdb' }}
      schema: staging
      threads: 1
      module_paths: ["{{ env_var('DBT_AFFILIATE_PROJECT_DIR') }}"]

    impact_radius:
      type: duckdb
      path: >-
        {{ env_var('AFFILIATE_DUCKDB_PATH', env_var('HOME')) ~ '/affiliate_impact_radius.duckdb' }}
      schema: staging
      threads: 1
      module_paths: ["{{ env_var('DBT_AFFILIATE_PROJECT_DIR') }}"]

    partnerize:
      type: duckdb
      path: >-
        {{ env_var('AFFILIATE_DUCKDB_PATH', env_var('HOME')) ~ '/affiliate_partnerize.duckdb' }}
      schema: staging
      threads: 1
      module_paths: ["{{ env_var('DBT_AFFILIATE_PROJECT_DIR') }}"]

    pepperjam:
      type: duckdb
      path: >-
        {{ env_var('AFFILIATE_DUCKDB_PATH', env_var('HOME')) ~ '/affiliate_pepperjam.duckdb' }}
      schema: staging
      threads: 1
      module_paths: ["{{ env_var('DBT_AFFILIATE_PROJECT_DIR') }}"]

    rakuten:
      type: duckdb
      path: >-
        {{ env_var('AFFILIATE_DUCKDB_PATH', env_var('HOME')) ~ '/affiliate_rakuten.duckdb' }}
      schema: staging
      threads: 1
      module_paths: ["{{ env_var('DBT_AFFILIATE_PROJECT_DIR') }}"]

    tradedoubler:
      type: duckdb
      path: >-
        {{ env_var('AFFILIATE_DUCKDB_PATH', env_var('HOME')) ~ '/affiliate_tradedoubler.duckdb' }}
      schema: staging
      threads: 1
      module_paths: ["{{ env_var('DBT_AFFILIATE_PROJECT_DIR') }}"]
      
    webgains:
      type: duckdb
      path: >-
        {{ env_var('AFFILIATE_DUCKDB_PATH', env_var('HOME')) ~ '/affiliate_webgains.duckdb' }}
      schema: staging
      threads: 1
      module_paths: ["{{ env_var('DBT_AFFILIATE_PROJECT_DIR') }}"]

# Redshift connections for loading final transformed data, used in step3_upload_to_s3.sql and downstream processes            
    redshift_dev:
      type: redshift
      host: "{{ env_var('DBT_REDSHIFT_DEV_HOST', env_var('REDSHIFT_URI', '')) }}"
      user: "{{ env_var('DBT_REDSHIFT_DEV_USER', env_var('REDSHIFT_DB_USER', '')) }}"
      password: "{{ env_var('DBT_REDSHIFT_DEV_PASSWORD', env_var('REDSHIFT_DB_PASS', '')) }}"
      port: "{{ env_var('DBT_REDSHIFT_DEV_PORT', '5439') | int }}"
      dbname: "{{ env_var('DBT_REDSHIFT_DEV_DBNAME', env_var('REDSHIFT_DB_NAME', '')) }}"
      schema: landing
      threads: 1
      sslmode: verify-full

    redshift_prod:
      type: redshift
      host: "{{ env_var('DBT_REDSHIFT_PROD_HOST', env_var('REDSHIFT_URI', '')) }}"
      user: "{{ env_var('DBT_REDSHIFT_PROD_USER', env_var('REDSHIFT_DB_USER', '')) }}"
      password: "{{ env_var('DBT_REDSHIFT_PROD_PASSWORD', env_var('REDSHIFT_DB_PASS', '')) }}"
      port: "{{ env_var('DBT_REDSHIFT_PROD_PORT', '5439') | int }}"
      dbname: "{{ env_var('DBT_REDSHIFT_PROD_DBNAME', env_var('REDSHIFT_DB_NAME', '')) }}"
      schema: landing
      threads: 1
      sslmode: verify-full